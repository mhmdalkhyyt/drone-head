<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Drone Command Center</title>
  <link rel="stylesheet" href="../style.css" />
  <link rel="stylesheet" href="login.css" />
</head>
<body class="login-body">
  <div class="login-container">
    <!-- Logo/Header -->
    <div class="login-header">
      <div class="login-logo">
        <span class="logo-icon">🚁</span>
        <span class="logo-text">Drone Command</span>
      </div>
      <h1 class="login-title">Command Center</h1>
    </div>

    <!-- Login/Register Forms -->
    <div class="login-forms">
      <!-- Login Form -->
      <div id="login-form" class="form-panel">
        <h2 class="form-title">Login</h2>
        <form id="login-form-el" class="login-form">
          <div class="form-group">
            <label for="login-username">Username</label>
            <input type="text" id="login-username" name="username" required autocomplete="username" placeholder="Enter your username" />
          </div>
          <div class="form-group">
            <label for="login-password">Password</label>
            <input type="password" id="login-password" name="password" required autocomplete="current-password" placeholder="Enter your password" />
          </div>
          <div id="login-error" class="form-error hidden"></div>
          <button type="submit" class="btn btn-primary btn-full">Login</button>
        </form>
        <div class="form-footer">
          <span>Don't have an account?</span>
          <button id="show-register" class="btn-link">Register</button>
        </div>
      </div>

      <!-- Register Form -->
      <div id="register-form" class="form-panel hidden">
        <h2 class="form-title">Create Account</h2>
        <form id="register-form-el" class="login-form">
          <div class="form-group">
            <label for="register-username">Username</label>
            <input type="text" id="register-username" name="username" required autocomplete="username" placeholder="Choose a username (min 3 characters)" />
          </div>
          <div class="form-group">
            <label for="register-password">Password</label>
            <input type="password" id="register-password" name="password" required autocomplete="new-password" placeholder="Choose a password (min 6 characters)" />
          </div>
          <div class="form-group">
            <label for="register-confirm">Confirm Password</label>
            <input type="password" id="register-confirm" name="confirm" required autocomplete="new-password" placeholder="Confirm your password" />
          </div>
          <div id="register-error" class="form-error hidden"></div>
          <button type="submit" class="btn btn-primary btn-full">Create Account</button>
        </form>
        <div class="form-footer">
          <span>Already have an account?</span>
          <button id="show-login" class="btn-link">Login</button>
        </div>
      </div>
    </div>

    <!-- Delete Account Section -->
    <div class="delete-section">
      <button id="show-delete" class="btn-link btn-link-danger">Delete Account</button>
      <div id="delete-panel" class="delete-panel hidden">
        <h3>Delete Your Account</h3>
        <p class="delete-warning">⚠️ This action cannot be undone. All your saved states will be permanently deleted.</p>
        <form id="delete-form" class="login-form">
          <div class="form-group">
            <label for="delete-username">Username</label>
            <input type="text" id="delete-username" required placeholder="Enter your username to confirm" />
          </div>
          <div class="form-group">
            <label for="delete-password">Password</label>
            <input type="password" id="delete-password" required placeholder="Enter your password to confirm" />
          </div>
          <div id="delete-error" class="form-error hidden"></div>
          <div class="delete-actions">
            <button type="button" id="cancel-delete" class="btn btn-secondary">Cancel</button>
            <button type="submit" class="btn btn-danger">Yes, Delete Account</button>
          </div>
        </form>
      </div>
    </div>

    <!-- Footer -->
    <div class="login-footer">
      <p>Secure access to Drone Command Center</p>
    </div>
  </div>

  <script src="login.js"></script>
</body>
</html>
